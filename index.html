<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BNK 영업지원</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      margin: 0;
      padding: 32px;
      background: #f5f7fb;
      color: #1f2937;
    }
    .header {
      background: linear-gradient(135deg, #0033A0 0%, #0066CC 100%);
      color: white;
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 12px rgba(0, 51, 160, 0.15);
    }
    .header h1 { margin: 0 0 8px 0; font-size: 28px; }
    .header p { margin: 0; opacity: 0.9; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }
    .card {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      border: 1px solid #e5e7eb;
    }
    .card h2 { margin: 0 0 12px 0; color: #0033A0; font-size: 18px; }
    .card p { margin: 0; color: #6b7280; line-height: 1.6; }
    .badge {
      display: inline-block;
      background: #fef3c7;
      color: #92400e;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>BNK 영업지원시스템</h1>
    <p>Teams 통합 포털 · 메인 화면</p>
  </div>

  <div class="grid">
    <div class="card">
      <h2>📊 오늘의 실적</h2>
      <p>일일 영업 실적 요약이 여기에 표시됩니다.</p>
      <span class="badge">목업</span>
    </div>
    <div class="card">
      <h2>📢 공지사항</h2>
      <p>본사 및 영업본부 주요 공지가 표시됩니다.</p>
      <span class="badge">목업</span>
    </div>
    <div class="card">
      <h2>👥 고객 관리</h2>
      <p>담당 고객 리스트와 최근 활동 내역.</p>
      <span class="badge">목업</span>
    </div>
    <div class="card">
      <h2>📅 일정</h2>
      <p>오늘과 이번 주의 영업 일정.</p>
      <span class="badge">목업</span>
    </div>
  </div>
</body>
</html>
